version: "3.9"

services:
  fakeguard:
    build: .
    container_name: fakeguard-ai
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./models/saved:/app/models/saved
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
