# .streamlit/config.toml
# Streamlit configuration for FakeGuard AI

[theme]
base = "dark"
primaryColor = "#6C63FF"
backgroundColor = "#0A0E1A"
secondaryBackgroundColor = "#111827"
textColor = "#F8FAFC"
font = "sans serif"

[server]
headless = true
port = 8501
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
